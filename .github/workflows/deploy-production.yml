name: Associum Landing Production CI/CD

# Publishing a GitHub Release -> deploy to production.
# (The release tag's commit is what gets built and deployed.)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ^9.15

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.9.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          DEPLOY_ENV: production
        run: pnpm build

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        env:
          WEBSITE_BUCKET_NAME: ${{ secrets.WEBSITE_BUCKET_NAME }}
        run: |
          # Long-cache fingerprinted assets, short-cache HTML/XML/TXT so deploys go live fast.
          aws s3 sync dist/ "s3://${WEBSITE_BUCKET_NAME}/" \
            --delete --exclude "*.html" --exclude "*.xml" --exclude "*.txt" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync dist/ "s3://${WEBSITE_BUCKET_NAME}/" \
            --delete --exclude "*" --include "*.html" --include "*.xml" --include "*.txt" \
            --cache-control "public, max-age=0, s-maxage=300, stale-while-revalidate=86400"

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
